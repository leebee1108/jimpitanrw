<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scan Jimpitan</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}
.header {
  padding:15px;
  font-size:20px;
  background:#1e293b;
}
#reader {
  margin:20px;
}
.status {
  margin-top:15px;
}
</style>
</head>

<body>

<div class="header">SCAN JIMPITAN</div>
<div id="reader"></div>
<div class="status" id="status">Siap scan...</div>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>
const URL = "https://script.google.com/macros/s/AKfycbyWyFVsrAHBxYhZg7h5BpnIcAxceyyLWLhwGsYmncTWQzlrfCZPDc4HzxlR7eL9AAOb/exec";

let lock = false;

function kirim(rumah){
  document.getElementById("status").innerHTML = "Mengirim...";

  fetch(URL + "?rumah=" + rumah)
  .then(res => res.text())
  .then(() => {
    document.getElementById("status").innerHTML = "✔ Berhasil: " + rumah;

    lock = true;
    setTimeout(() => {
      lock = false;
      document.getElementById("status").innerHTML = "Siap scan...";
    }, 2000);
  });
}

const html5QrCode = new Html5Qrcode("reader");

html5QrCode.start(
  { facingMode: "environment" },
  { fps: 10, qrbox: 250 },
  (decodedText) => {
    if (!lock) {
      kirim(decodedText);
    }
  }
);
</script>

</body>
</html>
