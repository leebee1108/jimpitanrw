<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jimpitan RT</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Poppins', sans-serif;
  background: linear-gradient(135deg,#0f172a,#020617);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card {
  width:90%;
  max-width:350px;
  padding:30px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  box-shadow:0 0 40px rgba(0,0,0,0.6);
  text-align:center;
  animation:fadeIn 0.5s ease;
}

h1 {
  margin-bottom:10px;
  font-size:22px;
}

.rumah {
  font-size:18px;
  margin-top:10px;
  opacity:0.8;
}

.status {
  margin-top:20px;
  font-size:20px;
  font-weight:bold;
  transition:0.3s;
}

.success {
  color:#22c55e;
  text-shadow:0 0 10px #22c55e;
}

.warning {
  color:#facc15;
  text-shadow:0 0 10px #facc15;
}

.error {
  color:#ef4444;
  text-shadow:0 0 10px #ef4444;
}

.loader {
  margin:20px auto;
  border:4px solid #333;
  border-top:4px solid #22c55e;
  border-radius:50%;
  width:40px;
  height:40px;
  animation:spin 1s linear infinite;
}

@keyframes spin {
  100% { transform:rotate(360deg); }
}

@keyframes fadeIn {
  from { opacity:0; transform:scale(0.9); }
  to { opacity:1; transform:scale(1); }
}
</style>
</head>

<body>

<div class="card">
  <h1>📱 Jimpitan RT</h1>

  <div id="rumah" class="rumah">Memproses...</div>

  <div class="loader" id="loader"></div>

  <div id="status" class="status">Memproses...</div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbyWyFVsrAHBxYhZg7h5BpnIcAxceyyLWLhwGsYmncTWQzlrfCZPDc4HzxlR7eL9AAOb/exec";

const params = new URLSearchParams(window.location.search);
const rumah = params.get("rumah");

const status = document.getElementById("status");
const rumahText = document.getElementById("rumah");
const loader = document.getElementById("loader");

// 🔊 preload audio (biar bisa bunyi di HP)
const audio = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");

function bunyi(){
  audio.play().catch(()=>{});
}

function getar(){
  if (navigator.vibrate) navigator.vibrate(200);
}

if (!rumah) {
  loader.style.display = "none";
  status.innerHTML = "❌ QR tidak valid";
  status.className = "status error";

} else {

  rumahText.innerHTML = "🏠 " + rumah;

  // ⚡ LANGSUNG FEEDBACK (BIAR CEPAT)
  loader.style.display = "none";
  status.innerHTML = "✅ Terscan";
  status.className = "status success";

  bunyi();
  getar();

  // 🚀 kirim di background (biar gak nunggu)
  fetch(URL + "?rumah=" + encodeURIComponent(rumah))
    .then(res => res.text())
    .then(res => {
      console.log("Server:", res);
    })
    .catch(() => {
      console.log("Gagal kirim");
    });
}
  setTimeout(() => {
  window.location.href = "dashboard.html";
}, 1500);

  <button onclick="aktifkanAudio()">🔊 Aktifkan Suara</button>
let audioReady = false;
const audio = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");

function aktifkanAudio(){
  audio.play().then(()=>{
    audio.pause();
    audio.currentTime = 0;
    audioReady = true;
  });
}

function bunyi(){
  if(audioReady){
    audio.currentTime = 0;
    audio.play();
  }
}
</script>
</body>
</html>
