<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Scan Jimpitan</title>

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      background: #0f172a;
      color: white;
    }

    .card {
      margin-top: 50px;
      padding: 30px;
    }

    .status {
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>📱 SCAN JIMPITAN</h1>
  <div id="rumah"></div>
  <div class="status" id="status">Memproses...</div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbyWyFVsrAHBxYhZg7h5BpnIcAxceyyLWLhwGsYmncTWQzlrfCZPDc4HzxlR7eL9AAOb/exec";

<script>
const URL = "PASTE_URL_APPS_SCRIPT_KAMU";

const params = new URLSearchParams(window.location.search);
const rumah = params.get("rumah");

if (!rumah) {
  document.getElementById("status").innerHTML = "❌ QR tidak valid";
} else {

  document.getElementById("rumah").innerHTML = "🏠 " + rumah;

  fetch(URL + "?rumah=" + encodeURIComponent(rumah))
    .then(res => res.text())
    .then(res => {
      if (res == "NORMAL") {
        document.getElementById("status").innerHTML = "✅ Normal";
      } else {
        document.getElementById("status").innerHTML = "⚠️ Sudah diambil hari ini";
      }
    });
}
</script>


</body>
</html>
