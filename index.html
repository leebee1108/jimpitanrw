<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Scan Jimpitan</title>

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      background: #0f172a;
      color: white;
    }

    .card {
      margin-top: 50px;
      padding: 30px;
    }

    .status {
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>📱 SCAN JIMPITAN</h1>
  <div id="rumah"></div>
  <div class="status" id="status">Memproses...</div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbyWyFVsrAHBxYhZg7h5BpnIcAxceyyLWLhwGsYmncTWQzlrfCZPDc4HzxlR7eL9AAOb/exec";

const params = new URLSearchParams(window.location.search);
const rumah = params.get("rumah");

const status = document.getElementById("status");
const rumahText = document.getElementById("rumah");

if (!rumah) {
  status.innerHTML = "❌ QR tidak valid";
} else {
  rumahText.innerHTML = "🏠 " + rumah;
  status.innerHTML = "⏳ Mengirim...";

  fetch(URL + "?rumah=" + encodeURIComponent(rumah))
    .then(res => res.text())
    .then(res => {
      if (res === "NORMAL") {
        status.innerHTML = "✅ Berhasil (Normal)";
      } else if (res === "DOUBLE HARI INI") {
        status.innerHTML = "⚠️ Sudah diambil hari ini";
      } else {
        status.innerHTML = "ℹ️ " + res;
      }
    })
    .catch(() => {
      status.innerHTML = "❌ Gagal koneksi";
    });
}
</script>


</body>
</html>
