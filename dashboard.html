<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard RT</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background: radial-gradient(circle at top,#1e293b,#020617);
  color:white;
}

.container{
  padding:20px;
  max-width:500px;
  margin:auto;
}

h1{
  text-align:center;
  margin-bottom:20px;
}

.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  border-radius:20px;
  padding:20px;
  margin-bottom:15px;
  box-shadow:0 0 30px rgba(0,0,0,0.5);
  transition:0.3s;
}

.card:hover{
  transform:scale(1.02);
}

.label{
  opacity:0.7;
  font-size:14px;
}

.value{
  font-size:32px;
  font-weight:700;
  margin-top:5px;
}

.money{
  color:#22c55e;
  text-shadow:0 0 10px #22c55e;
}

.scan{
  color:#38bdf8;
  text-shadow:0 0 10px #38bdf8;
}

.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:15px;
  background:#22c55e;
  color:black;
  font-weight:bold;
  margin-top:15px;
}

.footer{
  text-align:center;
  margin-top:20px;
  font-size:12px;
  opacity:0.5;
}
</style>
</head>

<body>

<div class="container">

  <h1>📊 Dashboard RT</h1>

  <div class="card">
    <div class="label">Total Scan Hari Ini</div>
    <div id="total" class="value scan">0</div>
  </div>

  <div class="card">
    <div class="label">Total Uang Hari Ini</div>
    <div id="uang" class="value money">Rp 0</div>
  </div>

  <button class="btn" onclick="location.href='/'">🔙 Kembali Scan</button>

  <div class="footer">
    Auto update tiap 5 detik
  </div>

</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbyWyFVsrAHBxYhZg7h5BpnIcAxceyyLWLhwGsYmncTWQzlrfCZPDc4HzxlR7eL9AAOb/exec";

function loadData(){
  fetch(URL + "?mode=dashboard")
  .then(res => res.json())
  .then(data => {

    document.getElementById("total").innerHTML = data.total;

    document.getElementById("uang").innerHTML =
      "Rp " + Number(data.uang).toLocaleString("id-ID");

  })
  .catch(() => {
    document.getElementById("total").innerHTML = "Error";
  });
}

// load pertama
loadData();

// auto refresh
setInterval(loadData, 5000);
</script>

</body>
</html>
