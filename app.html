<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jimpitan App</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#020617;
  color:white;
}

.page{
  display:none;
  padding:20px;
}

.active{
  display:block;
}

h1{
  text-align:center;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:20px;
  margin-top:15px;
  backdrop-filter:blur(10px);
}

/* NAVBAR */
.navbar{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#0f172a;
}

.navbar button{
  flex:1;
  padding:15px;
  border:none;
  background:none;
  color:white;
  font-size:14px;
}

.active-btn{
  background:#22c55e;
  color:black;
}

/* BUTTON */
.btn{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- ================= SCAN ================= -->
<div id="scan" class="page active">
  <h1>📷 Scan Jimpitan</h1>

  <div class="card">
    <input id="rumah" placeholder="Input nama rumah" style="width:100%;padding:10px;border-radius:10px;border:none;">
    <button class="btn" onclick="scan()">SCAN</button>

    <div id="status" style="margin-top:10px;">Siap...</div>
  </div>
</div>

<!-- ================= DASHBOARD ================= -->
<div id="dashboard" class="page">
  <h1>📊 Dashboard</h1>

  <div class="card">
    <div>Total Scan</div>
    <h2 id="total">0</h2>
  </div>

  <div class="card">
    <div>Total Uang</div>
    <h2 id="uang">Rp 0</h2>
  </div>
</div>

<!-- ================= NAV ================= -->
<div class="navbar">
  <button id="btnScan" class="active-btn" onclick="showPage('scan')">Scan</button>
  <button id="btnDash" onclick="showPage('dashboard')">Dashboard</button>
</div>

<script>
const URL = "https://script.google.com/macros/library/d/1E0-CRgfyK-yaRzVbXWoEa7ZJilix_gn06vS4MLRi-gtNaj1Waj0KCpRp/15";

// NAV
function showPage(page){
  document.getElementById("scan").classList.remove("active");
  document.getElementById("dashboard").classList.remove("active");

  document.getElementById("btnScan").classList.remove("active-btn");
  document.getElementById("btnDash").classList.remove("active-btn");

  document.getElementById(page).classList.add("active");

  if(page === "dashboard"){
    document.getElementById("btnDash").classList.add("active-btn");
    loadDashboard();
  }else{
    document.getElementById("btnScan").classList.add("active-btn");
  }
}

// SCAN
function scan(){
  let rumah = document.getElementById("rumah").value;

  if(!rumah){
    alert("Isi dulu");
    return;
  }

  document.getElementById("status").innerHTML = "Mengirim...";

  fetch(URL + "?rumah=" + rumah)
  .then(() => {
    document.getElementById("status").innerHTML = "✅ Berhasil";

    setTimeout(()=>{
      showPage("dashboard");
    },1000);
  });
}

// DASHBOARD
function loadDashboard(){
  fetch(URL + "?mode=dashboard")
  .then(res => res.json())
  .then(data => {
    document.getElementById("total").innerHTML = data.total;
    document.getElementById("uang").innerHTML =
      "Rp " + Number(data.uang).toLocaleString("id-ID");
  });
}
</script>

</body>
</html>
